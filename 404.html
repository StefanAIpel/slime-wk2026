<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a16">
  <meta name="robots" content="noindex">
  <title>Gangpad 404 · World Cup Slime</title>
  <meta name="description" content="Deze SlimeScore-link ligt nog in onderdelen. De Zweedse Ikea Slime sleutelt eraan.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    html, body {
      min-height: 100%;
      height: auto;
      overflow: auto;
      touch-action: auto;
      user-select: text;
      -webkit-user-select: text;
      background:
        radial-gradient(130% 90% at 50% -16%, rgba(255,122,24,.28), transparent 56%),
        radial-gradient(120% 80% at 50% 116%, rgba(31,143,58,.20), transparent 60%),
        radial-gradient(90% 70% at 50% 42%, #16203f 0%, #0b1024 52%, #06060f 100%);
    }
    .error-shell {
      width: min(1120px, calc(100% - 32px));
      min-height: 100dvh;
      margin: 0 auto;
      display: grid;
      align-content: center;
      gap: 18px;
      padding: max(24px, env(safe-area-inset-top)) 0 max(96px, env(safe-area-inset-bottom));
    }
    .error-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      width: fit-content;
      color: #fff;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: -.02em;
    }
    .error-brand img { width: 58px; height: 58px; border-radius: 16px; box-shadow: 0 10px 28px rgba(0,0,0,.4); }
    .error-card {
      display: grid;
      gap: 18px;
      align-items: center;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 28px;
      background:
        radial-gradient(circle at 88% -18%, rgba(255, 174, 59, .36), transparent 42%),
        radial-gradient(circle at 0% 120%, rgba(31, 143, 58, .28), transparent 46%),
        linear-gradient(140deg, rgba(27,27,58,.92), rgba(6,6,15,.96));
      box-shadow: 0 24px 70px rgba(0,0,0,.46);
      padding: clamp(22px, 4vw, 44px);
      position: relative;
    }
    .error-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.75) 1.5px, transparent 2px);
      background-size: 92px 92px;
      opacity: .14;
      pointer-events: none;
    }
    .error-copy, .error-art { position: relative; z-index: 1; }
    .error-kicker {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255,255,255,.12);
      color: var(--oranje2);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      border: 1px solid rgba(255,255,255,.18);
    }
    .error-title {
      margin: 14px 0 0;
      max-width: 760px;
      font-size: clamp(42px, 8vw, 92px);
      line-height: .9;
      text-transform: uppercase;
    }
    .error-title span {
      display: block;
      background: linear-gradient(95deg, #3b86ff 0%, #e4002b 52%, #00a64a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: #3b86ff;
      -webkit-text-fill-color: transparent;
    }
    .error-text {
      max-width: 640px;
      margin: 16px 0 0;
      color: #d8dcff;
      font-size: clamp(16px, 2.2vw, 21px);
      line-height: 1.6;
      font-weight: 700;
    }
    .error-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
    .error-actions .btn { text-decoration: none; display: inline-flex; align-items: center; justify-content: center; min-width: 0; }
    .error-art { justify-self: center; width: min(420px, 82vw); }
    .error-art img { display: block; width: 100%; height: auto; filter: drop-shadow(0 28px 32px rgba(0,0,0,.48)); }
    .error-shadow { width: 68%; height: 28px; margin: -16px auto 0; border-radius: 999px; background: rgba(0,0,0,.3); filter: blur(18px); }
    @media (min-width: 860px) { .error-card { grid-template-columns: 1.08fr .82fr; } }
  </style>
</head>
<body>
  <main class="error-shell">
    <a class="error-brand" href="/" aria-label="Terug naar World Cup Slime">
      <img src="assets/icons/app-icon-soccer-wc26-v2-192.png" width="192" height="192" alt="">
      <span>SlimeScore · Soccer</span>
    </a>

    <section class="error-card">
      <div class="error-copy">
        <div class="error-kicker">Gangpad 404 · tijdelijk onderhoud</div>
        <h1 class="title error-title">Deze link ligt <span>nog in onderdelen.</span></h1>
        <p class="error-text">
          De Zweedse Ikea Slime heeft de pagina bijna in elkaar. Alleen mist er nog één schroefje,
          een geldig pad en misschien een buitenspelregel.
        </p>
        <div class="error-actions">
          <a class="btn hero" href="/">⚽ Terug naar Slime Soccer</a>
          <a class="btn secondary" href="https://slimescore.com">🏆 WK-poule</a>
          <a class="btn secondary" href="https://volley.slimescore.com">🏐 Slime Volley</a>
        </div>
      </div>
      <div class="error-art" aria-hidden="true">
        <img src="assets/ikea-maintenance-slime.png" width="1161" height="1355" alt="">
        <div class="error-shadow"></div>
      </div>
    </section>
  </main>
</body>
</html>
