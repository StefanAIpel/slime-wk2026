# Static site — no build for the runtime; tests/build are dev-only (see package.json).
[build]
  publish = "."
  command = ""

# Security + correctness headers. CSP only controls who may embed this app;
# it does not restrict the app's own PeerJS/WebRTC/Supabase connections.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://slimescore.com https://slimescore.app"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Manifest must be served with the correct content type
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Long-lived caching for static media/icons (safe: these rarely change)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Always revalidate HTML and the service worker so new deploys show up immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Revalidate the app's JS/CSS so a new deploy is picked up on next load
# (paired with the network-first service worker — no manual cache-clearing needed)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
