name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # Always-on gate: syntax + ESLint + the headless logic suite (deterministic, no browser).
  # The Playwright browser tests (smoke/goal/wk/lb) are environment-sensitive (they exit on
  # any console error, and the online ones need a live peer/Supabase), so they're run
  # manually — see README. They now use bundled Chromium and honour BASE_URL for http runs.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Check (syntax + lint)
        run: npm run check
      - name: Logic tests (headless, no browser)
        run: npm run test:logic
