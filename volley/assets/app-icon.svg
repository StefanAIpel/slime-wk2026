<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a78ff"/><stop offset="0.5" stop-color="#1c3ba6"/><stop offset="1" stop-color="#0a1d63"/>
    </linearGradient>
    <linearGradient id="court" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0903e"/><stop offset="1" stop-color="#c8581f"/>
    </linearGradient>
    <radialGradient id="blue" cx="0.4" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#9cc6ff"/><stop offset="0.45" stop-color="#2b78e0"/><stop offset="1" stop-color="#103e96"/>
    </radialGradient>
    <radialGradient id="green" cx="0.42" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#b6f084"/><stop offset="0.45" stop-color="#34c95a"/><stop offset="1" stop-color="#137a2f"/>
    </radialGradient>
    <radialGradient id="ball" cx="0.4" cy="0.34" r="0.8">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e4e6ec"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe27a"/><stop offset="1" stop-color="#ff9e1e"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36a6ff"/><stop offset="1" stop-color="#5ad94a"/>
    </linearGradient>
    <radialGradient id="lite" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background + frame -->
  <rect width="1024" height="1024" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#r)"><clipPath id="r"><rect width="1024" height="1024" rx="190"/></clipPath></g>
  <clipPath id="card"><rect width="1024" height="1024" rx="190"/></clipPath>
  <g clip-path="url(#card)">
    <!-- arena light banks -->
    <circle cx="160" cy="150" r="180" fill="url(#lite)" opacity="0.55"/>
    <circle cx="864" cy="150" r="180" fill="url(#lite)" opacity="0.55"/>
    <g fill="#eef4ff">
      <rect x="70" y="92" width="190" height="86" rx="14"/><rect x="764" y="92" width="190" height="86" rx="14"/>
    </g>
    <g fill="#cfe0ff" opacity="0.85">
      <rect x="84" y="104" width="38" height="62" rx="6"/><rect x="132" y="104" width="38" height="62" rx="6"/><rect x="180" y="104" width="38" height="62" rx="6"/>
      <rect x="778" y="104" width="38" height="62" rx="6"/><rect x="826" y="104" width="38" height="62" rx="6"/><rect x="874" y="104" width="38" height="62" rx="6"/>
    </g>
    <!-- stands -->
    <rect x="0" y="300" width="1024" height="300" fill="#16276e"/>
    <g>
      <rect x="0" y="300" width="200" height="300" fill="#1b2f7e" opacity="0.7"/>
      <rect x="824" y="300" width="200" height="300" fill="#1b2f7e" opacity="0.7"/>
    </g>
    <!-- audience dots (sides) -->
    <g>
      <g fill="#ff8a1e"><circle cx="40" cy="360" r="6"/><circle cx="120" cy="420" r="6"/><circle cx="900" cy="372" r="6"/><circle cx="980" cy="440" r="6"/></g>
      <g fill="#ffd23b"><circle cx="80" cy="400" r="6"/><circle cx="160" cy="360" r="6"/><circle cx="940" cy="402" r="6"/><circle cx="860" cy="356" r="6"/></g>
      <g fill="#ffffff"><circle cx="60" cy="470" r="5"/><circle cx="150" cy="500" r="5"/><circle cx="912" cy="486" r="5"/><circle cx="970" cy="356" r="5"/></g>
      <g fill="#ff5470"><circle cx="110" cy="470" r="6"/><circle cx="40" cy="430" r="6"/><circle cx="966" cy="492" r="6"/><circle cx="884" cy="430" r="6"/></g>
      <g fill="#34d17a"><circle cx="170" cy="440" r="6"/><circle cx="46" cy="520" r="6"/><circle cx="924" cy="430" r="6"/><circle cx="996" cy="500" r="6"/></g>
    </g>
    <!-- confetti -->
    <g opacity="0.95">
      <rect x="300" y="120" width="20" height="28" rx="3" fill="#ff5470" transform="rotate(18 310 134)"/>
      <rect x="430" y="80" width="18" height="26" rx="3" fill="#ffd23b" transform="rotate(-12 439 93)"/>
      <rect x="600" y="92" width="20" height="26" rx="3" fill="#34d17a" transform="rotate(22 610 105)"/>
      <rect x="700" y="150" width="18" height="26" rx="3" fill="#36a6ff" transform="rotate(-20 709 163)"/>
      <rect x="360" y="220" width="16" height="24" rx="3" fill="#ffd23b" transform="rotate(30 368 232)"/>
      <rect x="660" y="240" width="16" height="24" rx="3" fill="#ff8a1e" transform="rotate(-26 668 252)"/>
      <rect x="250" y="190" width="16" height="22" rx="3" fill="#ffffff" transform="rotate(12 258 201)"/>
      <rect x="760" y="210" width="16" height="22" rx="3" fill="#ff5470" transform="rotate(-16 768 221)"/>
    </g>

    <!-- court -->
    <rect x="0" y="560" width="1024" height="464" fill="url(#court)"/>
    <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="6" fill="none">
      <path d="M512 560 L512 1024"/>
      <path d="M120 1024 L360 560"/><path d="M904 1024 L664 560"/>
      <path d="M40 760 L984 760" stroke-opacity="0.30"/>
    </g>
    <rect x="0" y="560" width="1024" height="10" fill="#00000022"/>

    <!-- net (centre) -->
    <g>
      <rect x="500" y="300" width="10" height="92" fill="#e23b2e"/>
      <rect x="500" y="300" width="10" height="46" fill="#ffffff"/>
      <g stroke="#ffffff" stroke-opacity="0.85" stroke-width="3">
        <path d="M398 392 H614"/>
        <path d="M398 392 V560 M430 392 V560 M462 392 V560 M494 392 V560 M526 392 V560 M558 392 V560 M590 392 V560 M614 392 V560"/>
        <path d="M398 420 H614 M398 448 H614 M398 476 H614 M398 504 H614 M398 532 H614 M398 560 H614" stroke-opacity="0.7"/>
      </g>
      <rect x="392" y="376" width="228" height="20" rx="6" fill="#ffffff"/>
      <rect x="566" y="470" width="44" height="150" rx="14" fill="#2b6fff"/>
      <rect x="566" y="470" width="16" height="150" rx="8" fill="#5a93ff"/>
    </g>

    <!-- gold motion trail + volleyball -->
    <g fill="none" stroke="url(#gold)" stroke-linecap="round">
      <path d="M250 360 C 360 300, 470 260, 560 230" stroke-width="34" opacity="0.95"/>
      <path d="M300 410 C 400 350, 500 312, 575 286" stroke-width="20" opacity="0.8"/>
    </g>
    <g transform="translate(606,206)">
      <circle r="104" fill="url(#ball)" stroke="#c9c9d0" stroke-width="4"/>
      <g stroke="#b9bcc6" stroke-width="5" fill="none" stroke-linecap="round">
        <path d="M-96 -28 A104 104 0 0 1 -8 -103"/>
        <path d="M104 -10 A104 104 0 0 1 30 100"/>
        <path d="M-70 78 A104 104 0 0 1 -96 -20"/>
        <path d="M-8 -103 A104 104 0 0 1 104 -10"/>
        <path d="M30 100 A104 104 0 0 1 -70 78"/>
      </g>
      <ellipse cx="-38" cy="-44" rx="30" ry="20" fill="#ffffff" opacity="0.7"/>
    </g>

    <!-- BLUE slime (left) -->
    <g>
      <ellipse cx="300" cy="612" rx="190" ry="26" fill="#000000" opacity="0.22"/>
      <path d="M122 612 C122 470 202 366 300 366 C404 366 478 484 478 612 Z" fill="url(#blue)"/>
      <path d="M150 408 C150 356 214 330 252 360 C262 300 304 306 300 372 C244 356 184 382 150 408 Z" fill="url(#blue)"/>
      <ellipse cx="232" cy="430" rx="64" ry="40" fill="#ffffff" opacity="0.18"/>
      <!-- eyes -->
      <g>
        <circle cx="270" cy="470" r="52" fill="#ffffff"/><circle cx="372" cy="470" r="46" fill="#ffffff"/>
        <circle cx="284" cy="458" r="26" fill="#10131c"/><circle cx="384" cy="460" r="22" fill="#10131c"/>
        <circle cx="276" cy="450" r="8" fill="#ffffff"/><circle cx="377" cy="452" r="7" fill="#ffffff"/>
      </g>
      <!-- mouth -->
      <path d="M300 540 q40 56 86 6 q-44 70 -92 8 Z" fill="#7a1620"/>
      <ellipse cx="318" cy="556" rx="30" ry="14" fill="#ff5a6a"/>
    </g>

    <!-- GREEN slime (right) -->
    <g>
      <ellipse cx="788" cy="636" rx="150" ry="22" fill="#000000" opacity="0.22"/>
      <path d="M646 636 C646 530 712 452 792 452 C880 452 940 536 940 636 Z" fill="url(#green)"/>
      <ellipse cx="740" cy="500" rx="50" ry="32" fill="#ffffff" opacity="0.18"/>
      <g>
        <circle cx="760" cy="540" r="42" fill="#ffffff"/><circle cx="846" cy="544" r="38" fill="#ffffff"/>
        <circle cx="772" cy="532" r="21" fill="#10131c"/><circle cx="856" cy="536" r="19" fill="#10131c"/>
        <circle cx="766" cy="525" r="6" fill="#ffffff"/><circle cx="850" cy="529" r="6" fill="#ffffff"/>
      </g>
      <path d="M784 596 q34 44 72 6 q-36 58 -78 8 Z" fill="#16401f"/>
      <ellipse cx="800" cy="610" rx="24" ry="11" fill="#ff5a6a"/>
    </g>

    <!-- wordmark -->
    <g font-family="'Arial Black','Arial',sans-serif" font-weight="900" text-anchor="middle">
      <text x="514" y="846" font-size="158" fill="#ffffff" stroke="#1b53c8" stroke-width="12" paint-order="stroke" letter-spacing="2">SLIME</text>
      <text x="514" y="846" font-size="158" fill="#ffffff" letter-spacing="2">SLIME</text>
      <text x="514" y="966" font-size="118" fill="url(#word)" stroke="#0f3f8a" stroke-width="10" paint-order="stroke" letter-spacing="1">VOLLEYBALL</text>
    </g>
  </g>
  <rect x="6" y="6" width="1012" height="1012" rx="186" fill="none" stroke="#bcd6ff" stroke-opacity="0.5" stroke-width="6"/>
</svg>
