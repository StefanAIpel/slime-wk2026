# Slime Volleyball — static site (no build step).
# Legacy copy only: the old auto-sync from slime-wk2026/volley to the ROOT of
# StefanAIpel/slime-volley is disabled. Edit/deploy from the dedicated
# StefanAIpel/slime-volley repo instead.
#   • Netlify site connected to: slime-volley
#   • Base directory:     (repo root)
#   • Publish directory:  .
#   • Build command:      (leave empty)
#   • Custom domains:     volley.slimescore.com  and  volley.slimescore.app
[build]
  publish = "."
  command = ""

# HTML + the service worker must never be cached by the CDN, so new deploys show instantly.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/404.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets can be cached hard.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://slimescore.com https://slimescore.app"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
