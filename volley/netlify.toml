# Slime Volleyball — static site (no build step).
# Lives at the ROOT of the dedicated "Slime-volley" repo.
#   • New Netlify site from the Slime-volley repo
#   • Base directory:     (leave empty / repo root)
#   • Publish directory:  .
#   • Build command:      (leave empty)
#   • Custom domains:     volley.slimescore.com  and  volley.slimescore.app
# (If instead deploying from the soccer repo's /volley folder, set Base = volley.)
[build]
  publish = "."
  command = ""

# HTML + the service worker must never be cached by the CDN, so new deploys show instantly.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets can be cached hard.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
